name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag della release (es. v1.0.0)"
        required: true

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: macos-14 # Consigliato per Apple Silicon
          - os: windows-latest
          - os: ubuntu-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup di Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Installa le dipendenze
        run: bun install

      - name: Build dell'app
        run: bun run build:canary

      - name: Pubblica su GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.event.release.tag_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
