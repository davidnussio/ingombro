name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag della release (es. v1.0.0)"
        required: true
      prerelease:
        description: "Pre-release (canary build)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            label: macos-arm64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            label: macos-x64
          - platform: ubuntu-22.04
            args: ""
            label: linux
          - platform: windows-latest
            args: ""
            label: windows

    runs-on: ${{ matrix.platform }}

    env:
      IS_PRERELEASE: ${{ github.event.release.prerelease || inputs.prerelease || false }}

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Allinea versione
        shell: bash
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json && rm -f package.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          echo "Versione allineata a: $VERSION"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.event.release.tag_name }}
          releaseName: "Ingombro ${{ inputs.tag || github.event.release.tag_name }}"
          releaseBody: ""
          releaseDraft: false
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          args: ${{ matrix.args }}

  update-homebrew:
    needs: build
    if: ${{ !(github.event.release.prerelease || inputs.prerelease || false) }}
    runs-on: ubuntu-latest
    steps:
      - name: Calcola SHA256 del DMG
        id: dmg
        run: |
          TAG="${{ inputs.tag || github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          URL="https://github.com/davidnussio/ingombro/releases/download/${TAG}/Ingombro_${VERSION}_aarch64.dmg"

          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o Ingombro.dmg -w "%{http_code}" "$URL")
            if [ "$HTTP_CODE" = "200" ]; then
              break
            fi
            echo "Attempt $i: got HTTP $HTTP_CODE, retrying in 15s..."
            sleep 15
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Failed to download DMG after 5 attempts"
            exit 1
          fi

          SHA256=$(shasum -a 256 Ingombro.dmg | awk '{print $1}')
          rm Ingombro.dmg

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: davidnussio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Aggiorna cask formula
        run: |
          mkdir -p Casks
          cat > Casks/ingombro.rb << 'EOF'
          cask "ingombro" do
            version "${{ steps.dmg.outputs.version }}"
            sha256 "${{ steps.dmg.outputs.sha256 }}"

            url "${{ steps.dmg.outputs.url }}"
            name "Ingombro"
            desc "Disk space analyzer and cleaner"
            homepage "https://github.com/davidnussio/ingombro"

            app "Ingombro.app"

            zap trash: [
              "~/Library/Application Support/dev.ingombro.app",
              "~/Library/Preferences/dev.ingombro.app.plist",
              "~/.ingombro",
            ]
          end
          EOF
          sed -i 's/^          //' Casks/ingombro.rb

      - name: Commit and push
        run: |
          VERSION="${{ steps.dmg.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/ingombro.rb
          git commit -m "ingombro ${VERSION}"
          git push
